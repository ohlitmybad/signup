/* Stripe and Gift options styling */
#stripeOption {
  display: block;

}

.payment-options-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
}

.stripe-section, .gift-section {
  position: relative;
  font-size: 13px;
  color: #999;
  display: inline-block;
  white-space: nowrap;
  flex-shrink: 0;
}

.gift-section {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.gift-section::before {
  content: "•";
  color: #666;
  font-size: 13px;
  margin-right: 8px;

.stripe-section a, .gift-section a {
  color: #0099dd;
  text-decoration: underline;
  transition: color 0.2s ease;
  font-size: 13px;
}

.stripe-section a:hover, .gift-section a:hover {
  color: #0088cc;
}

#stripeDropdown, #giftDropdown {
  display: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 100%;
  margin-bottom: 10px;
  background: #2a2a2a;
  border: 1px solid #00aaee;
  border-radius: 8px;
  min-width: 240px;
  z-index: 1000;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  white-space: nowrap;
}

#stripeDropdown a, #giftDropdown a {
  display: block;
  padding: 12px 20px;
  color: #fff;
  text-decoration: none;
  border-bottom: 1px solid #333;
  transition: background 0.2s ease;
}

#stripeDropdown a:first-child, #giftDropdown a:first-child {
  border-radius: 8px 8px 0 0;
}

#stripeDropdown a:last-child, #giftDropdown a:last-child {
  border-bottom: none;
  border-radius: 0 0 8px 8px;
}

#stripeDropdown a:hover, #giftDropdown a:hover {
  background: #3a3a3a;
}

@media (max-width: 767px) {
  .payment-options-wrapper {
    flex-direction: column;
    gap: 12px;
  }
  
  .gift-section::before {
    display: none;
  }
  
  #stripeDropdown, #giftDropdown {
    min-width: 200px;
  }
}

 function setLanguage(language) {
    localStorage.setItem('preferredLanguage', language);
    const url = new URL(window.location.href);
    if (language === 'en') {
      url.searchParams.delete('lang');
      applyLanguage('xx');
    } else {
      url.searchParams.set('lang', language);
      applyLanguage(language);
    }
    window.history.pushState({}, '', url);
  }
  
  function getPreferredLanguage() {
    // PRIORITY 1: Check URL parameter first
    const urlParams = new URLSearchParams(window.location.search);
    const langParam = urlParams.get('lang');
    if (langParam) {
      return langParam;
    }
    // PRIORITY 2: Check localStorage
    const storedLang = localStorage.getItem('preferredLanguage');
    if (storedLang) {
      return storedLang;
    }
    // PRIORITY 3: Use browser language
    return getBrowserLanguage() || 'en';
  }

  function getBrowserLanguage() {
    return navigator.language.slice(0, 2);
  }

  function applyLanguage(language) {
    console.log(language);

    if (language === 'en') {
      return;
    }

    
    fetch(`locales/${language}.json`)
      .then(response => {
        // Don't throw an error, just return null if response is not OK
        return response.ok ? response.json() : null;
      })
      .then(translations => {
        // Only proceed if translations exist
        if (translations) {
          document.querySelectorAll('[data-i18n]').forEach(element => {
            const keys = element.getAttribute('data-i18n').split('.');
            let value = translations;
            for (const key of keys) {
              if (value === undefined || value === null) break;
              value = value[key];
            }
            if (value) {
              if (element.tagName === 'META') {
              element.setAttribute('content', value);
          } else if (value.includes('<')) {
              element.innerHTML = value;
          } else {
              element.textContent = value;
          }          }
          });
          // REMOVE FOR PAGES WITH NO METADATA
          document.querySelector('meta[name="language"]').setAttribute('content', language);
        }
      })
      .catch(() => {
        // Completely empty catch block to silently ignore any errors
      });
  }
  
  const preferredLanguage = getPreferredLanguage();
  applyLanguage(preferredLanguage);
